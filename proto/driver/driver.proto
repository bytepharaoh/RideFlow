syntax = "proto3";

option go_package = "github.com/bytepharoh/rideflow/internal/driver/gen/proto/driver;driverv1";

package driver;

service DriverService {
    rpc RegisterDriver(RegisterDriverRequest)   returns (RegisterDriverResponse);
    rpc UpdateLocation(UpdateLocationRequest)   returns (UpdateLocationResponse);
    rpc SetAvailability(SetAvailabilityRequest) returns (SetAvailabilityResponse);
    rpc FindNearestAvailable(FindNearestAvailableRequest) returns (FindNearestAvailableResponse);
}

message RegisterDriverRequest {
    string name    = 1;
    string vehicle = 2;
}

message RegisterDriverResponse {
    string driver_id = 1;
    string name      = 2;
    string vehicle   = 3;
    string status    = 4;
}

message UpdateLocationRequest {
    string driver_id = 1;
    double latitude  = 2;
    double longitude = 3;
}

message UpdateLocationResponse {
    bool success = 1;
}

message SetAvailabilityRequest {
    string driver_id = 1;
    bool   online    = 2;
}

message SetAvailabilityResponse {
    string status = 1;
}

message FindNearestAvailableRequest {
    double latitude  = 1;
    double longitude = 2;
}

message FindNearestAvailableResponse {
    string driver_id = 1;
    string name      = 2;
    double latitude  = 3;
    double longitude = 4;
}