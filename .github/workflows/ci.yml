name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"

jobs:
  # ── Job 1: Lint ─────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.3

  # ── Job 2: Test ─────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: go test ./... -v -race -count=1

  # ── Job 3: Build ─────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install protoc
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest

      - name: Generate proto files
        run: make proto

      - name: Build all services
        run: make build

  # ── Job 4: E2E ──────────────────────────────────────────
  e2e:
    name: E2E Flow Test
    runs-on: ubuntu-latest
    needs: [lint, test, build]  # only run if all previous jobs pass
    services:
      rabbitmq:
        image: rabbitmq:3.13-management
        ports:
          - 5672:5672
          - 15672:15672
        env:
          RABBITMQ_DEFAULT_USER: guest
          RABBITMQ_DEFAULT_PASS: guest
        options: >-
          --health-cmd "rabbitmq-diagnostics ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install protoc
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest

      - name: Generate proto files
        run: make proto

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install CLI test dependencies
        run: |
          go install github.com/fullstorydev/grpcurl/cmd/grpcurl@latest

      - name: Wait for RabbitMQ
        run: |
          echo "Waiting for RabbitMQ..."
          ready=0
          for i in $(seq 1 30); do
            if curl -sf -u guest:guest http://localhost:15672/api/overview &>/dev/null; then
              echo "RabbitMQ is ready"
              ready=1
              break
            fi
            sleep 1
          done
          if [ "$ready" -ne 1 ]; then
            echo "RabbitMQ did not become ready in time"
            exit 1
          fi

      - name: Start services
        run: |
          go run ./cmd/trip    > /tmp/trip.log    2>&1 &
          go run ./cmd/driver  > /tmp/driver.log  2>&1 &
          go run ./cmd/gateway > /tmp/gateway.log 2>&1 &
          echo "Services starting..."

      - name: Wait for services to be healthy
        run: |
          echo "Waiting for gateway..."
          gateway_ready=0
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/health &>/dev/null; then
              echo "Gateway healthy"
              gateway_ready=1
              break
            fi
            sleep 1
          done
          if [ "$gateway_ready" -ne 1 ]; then
            echo "Gateway did not become healthy in time"
            cat /tmp/gateway.log || true
            exit 1
          fi

          echo "Waiting for driver gRPC..."
          driver_ready=0
          for i in $(seq 1 30); do
            if grpcurl -plaintext localhost:50052 list &>/dev/null; then
              echo "Driver gRPC healthy"
              driver_ready=1
              break
            fi
            sleep 1
          done
          if [ "$driver_ready" -ne 1 ]; then
            echo "Driver gRPC did not become healthy in time"
            cat /tmp/driver.log || true
            exit 1
          fi

      - name: Run e2e test
        run: |
          RIDER_ID="rider-ci-$$"
          WS_OUTPUT="/tmp/rideflow-ws-ci.txt"
          WS_READY="/tmp/rideflow-ws-ready"
          export WS_OUTPUT
          export WS_URL="ws://localhost:8080/ws?user_id=${RIDER_ID}"

          # Start a small Node WebSocket client instead of wscat.
          # This is more reliable in non-interactive CI shells.
          cat <<'EOF' > /tmp/ws-client.mjs
          import fs from "node:fs";

          const output = process.env.WS_OUTPUT;
          const ready = "/tmp/rideflow-ws-ready";
          const url = process.env.WS_URL;

          const ws = new WebSocket(url);

          ws.addEventListener("open", () => {
            fs.writeFileSync(ready, "connected\n");
          });

          ws.addEventListener("message", (event) => {
            fs.appendFileSync(output, `${event.data}\n`);
          });

          ws.addEventListener("error", (event) => {
            const message = event?.message ?? "unknown websocket error";
            fs.appendFileSync(output, `ERROR: ${message}\n`);
            process.exit(1);
          });

          ws.addEventListener("close", () => {
            process.exit(0);
          });

          setInterval(() => {}, 1000);
          EOF

          node /tmp/ws-client.mjs > /tmp/ws-client.log 2>&1 &
          WS_PID=$!

          for i in $(seq 1 10); do
            if [ -f "$WS_READY" ]; then
              echo "WebSocket client connected"
              break
            fi
            sleep 1
          done

          if [ ! -f "$WS_READY" ]; then
            echo "ERROR: WebSocket client failed to connect"
            echo "--- WS client logs ---"
            cat /tmp/ws-client.log || true
            echo "--- Gateway logs ---"
            cat /tmp/gateway.log || true
            exit 1
          fi

          # Register driver
          DRIVER_RESPONSE=$(grpcurl -plaintext \
            -d '{"name":"CI Driver","vehicle":"CI Car"}' \
            localhost:50052 \
            driver.DriverService/RegisterDriver)
          DRIVER_ID=$(echo "$DRIVER_RESPONSE" | jq -r '.driverId')

          grpcurl -plaintext \
            -d "{\"driver_id\":\"$DRIVER_ID\",\"latitude\":30.04,\"longitude\":31.23}" \
            localhost:50052 driver.DriverService/UpdateLocation

          grpcurl -plaintext \
            -d "{\"driver_id\":\"$DRIVER_ID\",\"online\":true}" \
            localhost:50052 driver.DriverService/SetAvailability

          # Create trip
          TRIP_RESPONSE=$(curl -s -X POST http://localhost:8080/api/v1/trips \
            -H "Content-Type: application/json" \
            -d "{
              \"rider_id\": \"$RIDER_ID\",
              \"origin\": \"Cairo\",
              \"destination\": \"Giza\",
              \"origin_lat\": 30.04,
              \"origin_lng\": 31.23
            }")

          TRIP_ID=$(echo "$TRIP_RESPONSE" | jq -r '.data.trip_id')
          echo "Trip created: $TRIP_ID"

          # Wait for WebSocket push
          for i in $(seq 1 10); do
            if grep -q "driver_assigned" "$WS_OUTPUT" 2>/dev/null; then
              echo "WebSocket push received"
              break
            fi
            sleep 1
          done

          if ! grep -q "driver_assigned" "$WS_OUTPUT"; then
            echo "ERROR: No WebSocket push received"
            echo "--- WS client logs ---"
            cat /tmp/ws-client.log || true
            echo "--- WS output ---"
            cat "$WS_OUTPUT" || true
            echo "--- Gateway logs ---"
            cat /tmp/gateway.log
            echo "--- Driver logs ---"
            cat /tmp/driver.log
            echo "--- Trip logs ---"
            cat /tmp/trip.log
            exit 1
          fi

          # Validate trip state
          sleep 1
          FINAL=$(curl -s "http://localhost:8080/api/v1/trips/$TRIP_ID")
          STATUS=$(echo "$FINAL" | jq -r '.data.status')

          echo "Final trip status: $STATUS"
          [ "$STATUS" = "accepted" ] || (echo "ERROR: Expected accepted, got $STATUS" && exit 1)

          kill $WS_PID 2>/dev/null || true
          echo "E2E test passed"

      - name: Print service logs on failure
        if: failure()
        run: |
          echo "=== Gateway ==="
          cat /tmp/gateway.log || true
          echo "=== Trip ==="
          cat /tmp/trip.log || true
          echo "=== Driver ==="
          cat /tmp/driver.log || true
